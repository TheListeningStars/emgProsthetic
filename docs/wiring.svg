<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <style>
    .box   { fill:#1d2230; stroke:#888; stroke-width:1.5; rx:6; ry:6; }
    .pwr   { fill:#3a2422; stroke:#c46; stroke-width:1.5; rx:6; ry:6; }
    .esp   { fill:#1c2b1d; stroke:#6c6; stroke-width:1.5; rx:6; ry:6; }
    .sensor{ fill:#1e2230; stroke:#69c; stroke-width:1.5; rx:6; ry:6; }
    .label { fill:#eee; font-weight:600; }
    .pin   { fill:#cce; }
    .sig   { stroke:#ffb84d; stroke-width:2; fill:none; }
    .vcc   { stroke:#ff5c5c; stroke-width:2; fill:none; }
    .gnd   { stroke:#888;    stroke-width:2; fill:none; stroke-dasharray:4,3; }
    .pwm   { stroke:#7be1ff; stroke-width:2; fill:none; }
    .legend{ fill:#aaa; }
    .small { font-size:11px; fill:#bcd; }
  </style>

  <text x="20" y="24" class="label" font-size="16">emgProsthetic — wiring diagram</text>
  <text x="20" y="42" class="legend">orange = analog signal · red = +V · grey dashed = GND · cyan = PWM</text>

  <!-- ESP-32 -->
  <rect class="esp" x="370" y="90" width="180" height="380"/>
  <text x="460" y="112" class="label" text-anchor="middle">ESP-32 WROOM</text>
  <text x="460" y="128" class="small" text-anchor="middle">(USB to laptop = data + power)</text>

  <!-- ESP pin labels -->
  <g class="pin">
    <text x="385" y="160">3V3</text>
    <text x="385" y="190">GND</text>
    <text x="385" y="220">GPIO32</text>
    <text x="385" y="250">GPIO34</text>
    <text x="385" y="280">GPIO35</text>
    <text x="385" y="310">GPIO33</text>
    <text x="385" y="340">GPIO18</text>
    <text x="385" y="370">5V (VIN)</text>
    <text x="385" y="440">USB</text>
  </g>

  <!-- pin dots -->
  <g fill="#cce">
    <circle cx="370" cy="156" r="3"/>
    <circle cx="370" cy="186" r="3"/>
    <circle cx="370" cy="216" r="3"/>
    <circle cx="370" cy="246" r="3"/>
    <circle cx="370" cy="276" r="3"/>
    <circle cx="370" cy="306" r="3"/>
    <circle cx="370" cy="336" r="3"/>
    <circle cx="370" cy="366" r="3"/>
    <circle cx="370" cy="436" r="3"/>
  </g>

  <!-- Sensors (left side) -->
  <rect class="sensor" x="40" y="140" width="220" height="55"/>
  <text x="150" y="160" class="label" text-anchor="middle">Gravity Analog EMG (SEN0240)</text>
  <text x="150" y="178" class="small" text-anchor="middle">3.3V · raw EMG (filtered on laptop)</text>

  <rect class="sensor" x="40" y="210" width="220" height="55"/>
  <text x="150" y="230" class="label" text-anchor="middle">Techtonics EMG #1 (m1)</text>
  <text x="150" y="248" class="small" text-anchor="middle">5V · envelope output</text>

  <rect class="sensor" x="40" y="280" width="220" height="55"/>
  <text x="150" y="300" class="label" text-anchor="middle">Techtonics EMG #2 (m2)</text>
  <text x="150" y="318" class="small" text-anchor="middle">5V · envelope output</text>

  <rect class="sensor" x="40" y="350" width="220" height="55"/>
  <text x="150" y="370" class="label" text-anchor="middle">Advancer Tech V3 (m3)</text>
  <text x="150" y="388" class="small" text-anchor="middle">5V · envelope output</text>

  <!-- signal lines from sensors to ESP -->
  <line class="sig" x1="260" y1="165" x2="370" y2="216"/>
  <line class="sig" x1="260" y1="235" x2="370" y2="246"/>
  <line class="sig" x1="260" y1="305" x2="370" y2="276"/>
  <line class="sig" x1="260" y1="375" x2="370" y2="306"/>

  <!-- Servo (right side) -->
  <rect class="sensor" x="680" y="320" width="200" height="60"/>
  <text x="780" y="342" class="label" text-anchor="middle">SG90 micro servo</text>
  <text x="780" y="362" class="small" text-anchor="middle">5V · PWM @ ~50 Hz</text>
  <line class="pwm" x1="550" y1="336" x2="680" y2="350"/>
  <line class="vcc" x1="680" y1="370" x2="600" y2="370"/>
  <line class="gnd" x1="680" y1="380" x2="600" y2="395"/>

  <!-- Power module + batteries -->
  <rect class="pwr" x="600" y="120" width="280" height="170"/>
  <text x="740" y="142" class="label" text-anchor="middle">Cytron MD-102 (5V / 3.3V rails)</text>
  <text x="740" y="160" class="small" text-anchor="middle">jumper: 5V on rail A · 3.3V on rail B</text>

  <rect x="620" y="180" width="100" height="36" fill="#222" stroke="#666"/>
  <text x="670" y="202" text-anchor="middle" fill="#eee">9V battery</text>
  <text x="670" y="216" text-anchor="middle" class="small" fill="#aaa">→ MD-102 DC jack</text>
  <line class="vcc" x1="720" y1="198" x2="775" y2="170"/>

  <rect x="745" y="180" width="100" height="36" fill="#222" stroke="#666"/>
  <text x="795" y="202" text-anchor="middle" fill="#eee">9V battery</text>
  <text x="795" y="216" text-anchor="middle" class="small" fill="#aaa">→ servo regulator</text>

  <rect x="620" y="235" width="100" height="36" fill="#222" stroke="#666"/>
  <text x="670" y="257" text-anchor="middle" fill="#eee">9V battery</text>
  <text x="670" y="271" text-anchor="middle" class="small" fill="#aaa">spare / parallel</text>

  <rect x="745" y="235" width="100" height="36" fill="#222" stroke="#666"/>
  <text x="795" y="257" text-anchor="middle" fill="#eee">9V battery</text>
  <text x="795" y="271" text-anchor="middle" class="small" fill="#aaa">spare / parallel</text>

  <!-- MD-102 -> sensors VCC rail (5V) -->
  <line class="vcc" x1="600" y1="210" x2="260" y2="235"/>
  <line class="vcc" x1="600" y1="215" x2="260" y2="305"/>
  <line class="vcc" x1="600" y1="220" x2="260" y2="375"/>
  <!-- MD-102 -> Gravity 3.3V -->
  <line class="vcc" x1="600" y1="200" x2="260" y2="165"/>

  <!-- common GND -->
  <line class="gnd" x1="370" y1="186" x2="600" y2="270"/>
  <line class="gnd" x1="40"  y1="195" x2="370" y2="186"/>
  <line class="gnd" x1="40"  y1="265" x2="370" y2="186"/>
  <line class="gnd" x1="40"  y1="335" x2="370" y2="186"/>
  <line class="gnd" x1="40"  y1="405" x2="370" y2="186"/>

  <!-- USB -->
  <rect x="200" y="500" width="180" height="40" fill="#222" stroke="#666"/>
  <text x="290" y="525" text-anchor="middle" fill="#eee">Laptop (USB serial)</text>
  <line class="pwm" x1="370" y1="436" x2="380" y2="520"/>
  <text x="320" y="475" class="small">data + 5V power</text>

  <!-- legend / notes -->
  <text x="20" y="585" class="legend">Sensor reference electrodes go on a nearby bony landmark (medial malleolus, patella).</text>
  <text x="20" y="603" class="legend">Keep servo current path on its own battery so spikes don't ride into the EMG ground.</text>
</svg>
